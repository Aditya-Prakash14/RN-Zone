<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"></rect>

  <!-- React Atom -->
  <g transform="translate(400,200)">
    <ellipse rx="120" ry="40" stroke="#61dafb" stroke-width="4" fill="none"></ellipse>
    <ellipse rx="120" ry="40" stroke="#61dafb" stroke-width="4" fill="none" transform="rotate(60)"></ellipse>
    <ellipse rx="120" ry="40" stroke="#61dafb" stroke-width="4" fill="none" transform="rotate(120)"></ellipse>
    
    <!-- Core -->
    <circle r="12" fill="#61dafb"></circle>
  </g>

  <!-- Title -->
  <text x="50%" y="90%" text-anchor="middle" fill="#e2e8f0" font-size="36" font-family="Arial, sans-serif">
    React Native Zone
  </text>

  <!-- Code Elements -->
  <text x="50" y="60" fill="#38bdf8" font-size="18" font-family="monospace">
    &lt;View&gt;
  </text>
  <text x="50" y="90" fill="#22c55e" font-size="18" font-family="monospace">
    &lt;Text&gt;Hello Dev&lt;/Text&gt;
  </text>
  <text x="50" y="120" fill="#38bdf8" font-size="18" font-family="monospace">
    &lt;/View&gt;
  </text>

  <!-- Mobile Frame -->
  <rect x="620" y="80" width="120" height="240" rx="20" stroke="#64748b" stroke-width="3" fill="none"></rect>
  <circle cx="680" cy="300" r="5" fill="#64748b"></circle>
</svg>