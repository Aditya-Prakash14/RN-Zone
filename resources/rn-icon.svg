<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradRN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb; stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#2563eb; stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="110" cy="110" r="100" fill="#0f172a"></circle>

  <!-- Mobile Frame -->
  <rect x="60" y="30" width="100" height="160" rx="20" stroke="url(#gradRN)" stroke-width="3" fill="none"></rect>

  <!-- React Atom -->
  <g transform="translate(110,110)">
    <ellipse rx="55" ry="18" stroke="url(#gradRN)" stroke-width="3" fill="none"></ellipse>
    <ellipse rx="55" ry="18" stroke="url(#gradRN)" stroke-width="3" fill="none" transform="rotate(60)"></ellipse>
    <ellipse rx="55" ry="18" stroke="url(#gradRN)" stroke-width="3" fill="none" transform="rotate(120)"></ellipse>
    
    <!-- Core -->
    <circle r="6" fill="url(#gradRN)"></circle>
  </g>

  <!-- RN Monogram -->
  <text x="110" y="118" text-anchor="middle" fill="#e2e8f0" font-size="28" font-family="Arial, sans-serif" font-weight="bold">
    RN
  </text>
</svg>