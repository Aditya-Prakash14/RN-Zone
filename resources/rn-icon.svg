<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradRN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"></stop>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#0f172a" rx="16"/>

  <!-- Mobile Phone Frame - Simplified for icon -->
  <rect x="32" y="20" width="64" height="88" rx="8" stroke="url(#gradRN)" stroke-width="2.5" fill="none"></rect>

  <!-- Screen Content - React Atom Orbits -->
  <g transform="translate(64, 55)" filter="url(#softGlow)">
    <!-- Orbit Paths -->
    <ellipse cx="0" cy="0" rx="22" ry="8" stroke="url(#gradRN)" stroke-width="2" fill="none" opacity="0.7"></ellipse>
    <ellipse cx="0" cy="0" rx="22" ry="8" stroke="url(#gradRN)" stroke-width="2" fill="none" opacity="0.7" transform="rotate(60)"></ellipse>
    <ellipse cx="0" cy="0" rx="22" ry="8" stroke="url(#gradRN)" stroke-width="2" fill="none" opacity="0.7" transform="rotate(120)"></ellipse>
    
    <!-- Electron Dots -->
    <circle cx="22" cy="0" r="2.5" fill="url(#gradRN)"></circle>
    <circle cx="-11" cy="19" r="2.5" fill="url(#gradRN)"></circle>
    <circle cx="-11" cy="-19" r="2.5" fill="url(#gradRN)"></circle>
    
    <!-- Nucleus -->
    <circle r="4" fill="url(#gradRN)"></circle>
  </g>

  <!-- Bottom Accent Line -->
  <line x1="32" y1="115" x2="96" y2="115" stroke="url(#gradRN)" stroke-width="2" opacity="0.5"/>
</svg>